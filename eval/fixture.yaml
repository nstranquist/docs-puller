# Retrieval bench fixture for docs-puller.
#
# Each entry: a (query, expected-paths) pair. Hit@K = an expected path
# appears in the top K results. Expected paths are checked verbatim against
# the search hit's `path` field — first segment must be the source dir.
#
# Mix:
#   - canonical lookups   : "row level security" → the authoritative doc
#   - cross-source        : queries phrased the way an agent would actually
#     ask, where the right doc may be in a different source than the
#     literal keyword vendor (e.g. "rate limit" → Slack web-api)
#   - known-tricky        : queries we currently miss or rank poorly,
#     kept here so embeddings/tuning experiments have a target to beat
#
# `source:` constrains the search to one source dir (mirrors the agent
# pattern of pre-deciding which vendor to ask). Omitted = search all.
#
# `note:` is for humans; ignored by the runner.

query_type: library_search

