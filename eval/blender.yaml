# Retrieval acceptance for the official Blender 5.1 Manual corpus.
# Every query is source-scoped because Blender Workspace agents should search
# the version-matched manual directly instead of the entire vendor corpus.

query_type: library_search

queries:
  # Modeling (7)
  - q: Geometry Nodes modifier
    source: blender
    expect:
      - blender/modeling/modifiers/geometry_nodes.md

  - q: Boolean modifier exact solver
    source: blender
    expect:
      - blender/modeling/modifiers/generate/booleans.md

  - q: Bevel modifier segments
    source: blender
    expect:
      - blender/modeling/modifiers/generate/bevel.md

  - q: Subdivision Surface modifier levels
    source: blender
    expect:
      - blender/modeling/modifiers/generate/subdivision_surface.md

  - q: UV unwrap seams
    source: blender
    expect:
      - blender/modeling/meshes/uv/unwrapping/seams.md

  - q: shape keys relative absolute
    source: blender
    expect:
      - blender/animation/shape_keys/shape_keys_panel.md
      - blender/animation/shape_keys/introduction.md

  - q: assign vertices to vertex group
    source: blender
    expect:
      - blender/modeling/meshes/properties/vertex_groups/assigning_vertex_group.md

  # Scripting and command line (5)
