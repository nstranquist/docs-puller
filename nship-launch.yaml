schema_version: 2
product_id: product.docs-puller
endpoint: docs-puller/oss
target_launch: launched
runtime_contracts:
  - id: docs-puller-public-install
    mode: managed
    environments:
      production:
        allowed_operations: [mutating]
        passthrough_env: [HOME, GOPATH, GOBIN, GOMODCACHE, GOPROXY, GOSUMDB, GONOSUMDB, GOPRIVATE]
deploy:
  name: install-public-release
  argv: [go, install, -tags, sqlite_fts5, github.com/nstranquist/docs-puller@v0.4.0]
  timeout_seconds: 900
  runtime: {contract: docs-puller-public-install, environment: production, operation: mutating}
verify:
  - name: version-contract
    category: runtime
    argv: [go, run, -tags, sqlite_fts5, github.com/nstranquist/docs-puller@v0.4.0, version, --expect, v0.4.0, --json]
    timeout_seconds: 900
    runtime: {contract: none, environment: production, operation: read}
  - name: public-repository
    category: distribution
    argv: [curl, --fail, --silent, --show-error, --location, https://github.com/nstranquist/docs-puller]
    timeout_seconds: 60
    runtime: {contract: none, environment: production, operation: read}
